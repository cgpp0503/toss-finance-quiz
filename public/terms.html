  <h1>서비스 이용약관</h1>

  <p>금융한줄 서비스 이용약관</p>

  <h2>1. 서비스 소개</h2>
  <p>금융한줄은 금융 용어를 한 줄 설명으로 배우고, 퀴즈를 통해 이해도를 확인할 수 있는 서비스를 제공합니다.</p>

  <h2>2. 이용 방법</h2>
  <p>이용자는 별도의 회원가입 없이 서비스를 이용할 수 있습니다.</p>

  <h2>3. 서비스 내용</h2>
  <p>금융 용어 설명, 퀴즈, 정답 및 해설을 제공합니다.</p>

  <h2>4. 책임의 한계</h2>
  <p>본 서비스에서 제공하는 금융 정보는 참고용이며, 투자 및 금융 판단의 책임은 이용자 본인에게 있습니다.</p>

  <h2>5. 서비스 변경</h2>
  <p>서비스는 운영상 필요에 따라 변경될 수 있습니다.</p>
